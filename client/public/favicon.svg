<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C8EFF"/>
      <stop offset="100%" stop-color="#4A6CF7"/>
    </linearGradient>
  </defs>
  <!-- Benzene outer ring -->
  <polygon points="32,6 56,20 56,44 32,58 8,44 8,20"
    fill="#0D1117" stroke="url(#g)" stroke-width="2" stroke-linejoin="round"/>
  <!-- Alternating inner double bonds (3 sides) -->
  <line x1="35" y1="9" x2="52" y2="22" stroke="#6C8EFF" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="52" y1="42" x2="35" y2="55" stroke="#6C8EFF" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="12" y1="22" x2="29" y2="9" stroke="#6C8EFF" stroke-width="1.2" stroke-opacity="0.5"/>
  <!-- 6 vertex nodes -->
  <circle cx="32" cy="6" r="3" fill="#22D3EE"/>
  <circle cx="56" cy="20" r="3" fill="#6C8EFF"/>
  <circle cx="56" cy="44" r="3" fill="#22D3EE"/>
  <circle cx="32" cy="58" r="3" fill="#6C8EFF"/>
  <circle cx="8" cy="44" r="3" fill="#22D3EE"/>
  <circle cx="8" cy="20" r="3" fill="#6C8EFF"/>
  <!-- Pulse through center -->
  <polyline points="15,32 23,32 27,25 31,39 35,23 39,37 43,29 50,29"
    fill="none" stroke="#22D3EE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="50" cy="29" r="2" fill="#22D3EE"/>
</svg>
